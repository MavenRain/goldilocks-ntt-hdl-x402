name = "ntt-x402"
main = "build/worker/shim.mjs"
compatibility_date = "2026-05-01"

[build]
# CARGO_TARGET_DIR pins the build to ./target inside worker/ so
# worker-build's relative artifact lookup matches where cargo writes,
# overriding the workspace-shared target dir at the repo root.
command = "cargo install -q worker-build && CARGO_TARGET_DIR=target worker-build --release"

[vars]
SOLANA_RPC_URL = "https://api.devnet.solana.com"
SOLANA_CLUSTER = "devnet"
RECEIPT_REGISTRY_PROGRAM_ID = "Recpt11111111111111111111111111111111111111"
DONOR_REGISTRY_PROGRAM_ID = "Dnr11111111111111111111111111111111111111111"
PRICING_SCHEDULE_PROGRAM_ID = "Prc11111111111111111111111111111111111111111"
# v0.1 ships against the CDP Solana-devnet facilitator so the first
# paid call can be smoke-tested against real x402 plumbing without
# touching mainnet USDC.  Flip to the mainnet facilitator
# (https://api.cdp.coinbase.com/x402/solana/v1) only after end-to-end
# devnet runs are clean.
FACILITATOR_URL = "https://api.cdp.coinbase.com/x402/solana-devnet/v1"
SELLER_PUBKEY = "6zP7sAnE1X6MuRcxPR7KQuABfTJTxacEGFvJ9LMtECY"
MAX_DEGREE_LOG2 = "12"

# Custom domain (`ntt.isurvivable.cv`) requires isurvivable.cv to be a
# Cloudflare zone, which requires moving authoritative DNS from
# Spaceship to Cloudflare's nameservers.  Until that's done, this
# Worker is reachable at ntt-x402.<your-cf-subdomain>.workers.dev.
# When you're ready to bind the custom domain, add isurvivable.cv as a
# site in the Cloudflare dashboard, switch nameservers at Spaceship,
# then uncomment the routes block below and redeploy.
#
# [[routes]]
# pattern = "ntt.isurvivable.cv"
# custom_domain = true

# Secrets (set via `wrangler secret put` from inside worker/):
#   SOLANA_SIGNER_KEY     base58-encoded ed25519 keypair for receipt writes (v0.2)
#   FAUCET_API_KEY        optional CDP faucet API key for unattended airdrop pulls
# SELLER_PUBKEY is a public address, set in [vars] above.
